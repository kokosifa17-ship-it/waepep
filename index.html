<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Checker Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4 md:p-10">
    <div class="max-w-4xl mx-auto bg-white p-6 rounded-xl shadow-md">
        <h1 class="text-2xl font-bold mb-4">WhatsApp Number Checker</h1>
        
        <div id="status" class="p-3 mb-4 rounded font-semibold text-center border">Memeriksa status bot...</div>

        <textarea id="numbersInput" class="w-full h-32 p-3 border rounded mb-4" placeholder="Masukkan nomor (Contoh: 08123456789, satu per baris)"></textarea>
        
        <button onclick="checkNumbers()" id="checkBtn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded transition">
            Mulai Cek Nomor
        </button>

        <div id="resultSection" class="mt-6 hidden">
            <div class="flex justify-between items-center mb-2">
                <h2 class="font-bold">Hasil Pengecekan:</h2>
                <button onclick="exportCSV()" class="bg-blue-500 text-white px-3 py-1 rounded text-sm hover:bg-blue-600">Download CSV</button>
            </div>
            <table class="w-full border-collapse border mt-2">
                <thead>
                    <tr class="bg-gray-200">
                        <th class="border p-2">Nomor</th>
                        <th class="border p-2">Status</th>
                    </tr>
                </thead>
                <tbody id="resultTable"></tbody>
            </table>
        </div>
    </div>

    <script>
        let latestResults = [];

        async function updateStatus() {
            const res = await fetch('/api/status');
            const data = await res.json();
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = data.message;
            statusDiv.className = `p-3 mb-4 rounded font-semibold text-center border ${data.ready ? 'bg-green-100 text-green-700 border-green-200' : 'bg-red-100 text-red-700 border-red-200'}`;
        }

        async function checkNumbers() {
            const input = document.getElementById('numbersInput').value.split('\n').filter(n => n.trim() !== "");
            if(input.length === 0) return alert("Masukkan nomor dulu!");
            
            const btn = document.getElementById('checkBtn');
            btn.innerText = "Memproses..."; btn.disabled = true;

            const res = await fetch('/api/check-numbers', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ numbers: input })
            });

            const data = await res.json();
            latestResults = data.results;
            
            const table = document.getElementById('resultTable');
            table.innerHTML = "";
            latestResults.forEach(r => {
                table.innerHTML += `<tr>
                    <td class="border p-2">${r.input}</td>
                    <td class="border p-2 font-bold ${r.registered ? 'text-green-600' : 'text-red-600'}">
                        ${r.registered ? 'Aktif' : 'Tidak Terdaftar'}
                    </td>
                </tr>`;
            });
            document.getElementById('resultSection').classList.remove('hidden');
            btn.innerText = "Mulai Cek Nomor"; btn.disabled = false;
        }

        function exportCSV() {
            let csv = "Nomor,Status\n" + latestResults.map(r => `${r.input},${r.registered ? 'Aktif' : 'Tidak'}`).join("\n");
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = "hasil_cek.csv"; a.click();
        }

        updateStatus();
    </script>
</body>
</html>
